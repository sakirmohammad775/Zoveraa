<svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Define Gradients -->
  <defs>
    <linearGradient id="gradient-z" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-overaa" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ecf0f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pattern definition for 'a' dot texture -->
    <pattern id="dot-pattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="5" cy="5" r="3" fill="#3498db" />
    </pattern>
    
    <!-- Clipping path for 'a' dot effect -->
    <clipPath id="clip-a">
      <path d="M 120 70 A 15 15 0 1 1 120 40 L 135 40 L 135 70 Z" />
    </clipPath>
  </defs>

  <!-- Text: Zoveraa -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Verdana, sans-serif" font-size="40" font-weight="bold">
    <tspan fill="url(#gradient-z)">Z</tspan><tspan fill="url(#gradient-overaa)">overaa</tspan>
  </text>
  
  <!-- Icon (Z shape) -->
  <path d="M 15 15 L 35 15 M 15 35 L 35 35 L 15 15 Z" stroke="#3498db" stroke-width="3" fill="none" transform="translate(10, 10)" />
  
  <!-- Underline/Swoosh -->
  <path d="M 60 75 Q 110 90 160 75" stroke="#2c3e50" stroke-width="2" fill="none" />
  
  <!-- Applying dot pattern to 'a's -->
  <rect x="110" y="40" width="30" height="30" fill="url(#dot-pattern)" clip-path="url(#clip-a)" transform="translate(-10, 0)"/>
  <rect x="140" y="40" width="30" height="30" fill="url(#dot-pattern)" clip-path="url(#clip-a)" transform="translate(-10, 0)"/>

  <!-- Logo title -->
  <title>Zoveraa Logo</title>
</svg>
